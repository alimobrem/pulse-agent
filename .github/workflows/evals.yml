name: Eval Framework

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      run_live_judge:
        description: "Run live replay with LLM judge scoring (costs API calls)"
        type: boolean
        default: false

jobs:
  evals:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PULSE_AGENT_DATABASE_URL: postgresql://pulse:pulse@localhost:5433/pulse_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Lint
        run: ruff check sre_agent/ tests/

      - name: Format check
        run: ruff format --check sre_agent/ tests/

      - name: Run unit tests
        run: python -m pytest tests/ -q

      - name: Verify version sync
        run: |
          python -c "
          import tomllib, re
          pkg = tomllib.load(open('pyproject.toml','rb'))['project']['version']
          chart = open('chart/Chart.yaml').read()
          chart_ver = re.search(r'^version:\s*(.+)$', chart, re.MULTILINE).group(1).strip()
          app_ver = re.search(r'^appVersion:\s*\"?([^\"]+)\"?$', chart, re.MULTILINE).group(1).strip()
          assert pkg == chart_ver, f'Version mismatch: pyproject.toml={pkg}, Chart.yaml version={chart_ver}'
          assert pkg == app_ver, f'appVersion mismatch: pyproject.toml={pkg}, Chart.yaml appVersion={app_ver}'
          print(f'Version sync OK: {pkg}')
          "

      - name: Helm lint
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint chart/
          helm template test chart/ --set vertexAI.projectId=test --set vertexAI.region=us-central1 --set wsAuth.existingSecret=test-token

      - name: Verify docs consistency
        run: |
          python -c "
          from importlib.metadata import version
          v = version('openshift-sre-agent')
          # Check README mentions correct version
          readme = open('README.md').read()
          assert v in readme, f'README.md does not mention version {v}'
          # Check API_CONTRACT has all REST endpoints from api.py
          contract = open('API_CONTRACT.md').read()
          for endpoint in ['/healthz', '/version', '/health', '/tools', '/fix-history', '/eval/status', '/monitor/capabilities', '/monitor/pause', '/monitor/resume', '/memory/export', '/memory/import', '/context']:
              assert endpoint in contract, f'API_CONTRACT.md missing endpoint {endpoint}'
          print(f'Docs consistency check passed (v{v})')
          "

      - name: Detect prompt changes
        id: prompt_changes
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- \
            sre_agent/agent.py sre_agent/security_agent.py sre_agent/view_designer.py \
            sre_agent/orchestrator.py sre_agent/runbooks.py sre_agent/harness.py \
            sre_agent/intelligence.py sre_agent/tool_chains.py 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Prompt-related files changed: $CHANGED"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prompt baseline comparison (gating on prompt changes)
        if: steps.prompt_changes.outputs.has_changes == 'true'
        run: |
          mkdir -p artifacts
          python -m sre_agent.evals.cli --suite release --compare-baseline --fail-on-regression --format json --output artifacts/prompt_comparison.json
          python -m sre_agent.evals.cli --suite view_designer --compare-baseline --fail-on-regression

      - name: Prompt token audit (non-gating)
        if: steps.prompt_changes.outputs.has_changes == 'true'
        run: |
          mkdir -p artifacts
          python -m sre_agent.evals.cli --audit-prompt --mode sre --format json --output artifacts/prompt_audit_sre.json
          python -m sre_agent.evals.cli --audit-prompt --mode view_designer --format json --output artifacts/prompt_audit_view_designer.json
          echo "### Prompt Token Audit" >> "$GITHUB_STEP_SUMMARY"
          python -m sre_agent.evals.cli --audit-prompt --mode sre >> "$GITHUB_STEP_SUMMARY"

      - name: Run view designer eval gate
        run: |
          python -m sre_agent.evals.cli --suite view_designer --format json --output artifacts/view_designer.json --fail-on-gate

      - name: Run release eval gate
        run: |
          python -m sre_agent.evals.cli --suite release --format json --output artifacts/release.json --fail-on-gate
          python -m sre_agent.evals.cli --suite release --format text --output artifacts/release.txt --fail-on-gate

      - name: Run replay evals (dry-run, no API key needed)
        run: |
          mkdir -p artifacts
          python -m sre_agent.evals.replay_cli --all --dry-run --format json > artifacts/replay.json || true
          python -m sre_agent.evals.replay_cli --all --dry-run --format text > artifacts/replay.txt || true

      - name: Run live replay with LLM judge (releases, daily cron, prompt changes, manual)
        if: >-
          (github.event_name == 'schedule')
          || (github.event_name == 'workflow_dispatch' && inputs.run_live_judge)
          || (steps.prompt_changes.outputs.has_changes == 'true')
          || startsWith(github.ref, 'refs/tags/v')
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          CLOUD_ML_REGION: ${{ secrets.VERTEX_REGION }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          mkdir -p artifacts
          if [ -n "$ANTHROPIC_VERTEX_PROJECT_ID" ] && [ -n "$GCP_SA_KEY" ]; then
            echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json
            python -m sre_agent.evals.replay_cli --all --judge --model claude-sonnet-4-6 --format json > artifacts/live_judge.json 2>/dev/null || true
            python -m sre_agent.evals.replay_cli --all --judge --model claude-sonnet-4-6 --format text > artifacts/live_judge.txt 2>/dev/null || true
            echo "### Live Judge Results" >> "$GITHUB_STEP_SUMMARY"
            if [ -s artifacts/live_judge.txt ]; then
              tail -5 artifacts/live_judge.txt >> "$GITHUB_STEP_SUMMARY"
            fi
            rm -f /tmp/gcp-sa-key.json
          else
            echo "Skipping live judge — no Vertex AI credentials configured"
            echo "Set VERTEX_PROJECT_ID, VERTEX_REGION, and GCP_SA_KEY secrets to enable"
          fi

      - name: Run safety and integration evals (non-gating)
        run: |
          python -m sre_agent.evals.cli --suite safety --format json --output artifacts/safety.json
          python -m sre_agent.evals.cli --suite integration --format json --output artifacts/integration.json

      - name: Generate outcome regression report (non-gating)
        run: |
          python -m sre_agent.evals.outcomes_cli --current-days 7 --baseline-days 7 --policy-file sre_agent/evals/policies/outcome_regression_policy.yaml --format json --output artifacts/outcomes.json
          python -m sre_agent.evals.outcomes_cli --current-days 7 --baseline-days 7 --policy-file sre_agent/evals/policies/outcome_regression_policy.yaml --format text --output artifacts/outcomes.txt

      - name: Generate weekly markdown digest
        run: |
          python -m sre_agent.evals.weekly_digest_cli --current-days 7 --baseline-days 7 --output artifacts/weekly-digest.md

      - name: Stage regression policy artifact
        run: |
          mkdir -p artifacts
          cp sre_agent/evals/policies/outcome_regression_policy.yaml artifacts/outcome_regression_policy.yaml

      - name: Publish eval check summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path("artifacts")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          lines: list[str] = ["## Pulse Agent Eval Summary", ""]

          def read_json(path: Path):
              if not path.exists():
                  return None
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return None

          release = read_json(artifacts / "release.json")
          safety = read_json(artifacts / "safety.json")
          integration = read_json(artifacts / "integration.json")
          view_designer = read_json(artifacts / "view_designer.json")
          outcomes = read_json(artifacts / "outcomes.json")
          live_judge = read_json(artifacts / "live_judge.json")

          if release:
              lines.append(
                  f"- release gate: {'PASS' if release.get('gate_passed') else 'FAIL'} "
                  f"(scenarios={release.get('scenario_count')}, avg={release.get('average_overall')})"
              )
          if safety:
              lines.append(
                  f"- safety suite: {'PASS' if safety.get('gate_passed') else 'FAIL'} "
                  f"(scenarios={safety.get('scenario_count')})"
              )
          if integration:
              lines.append(
                  f"- integration suite: {'PASS' if integration.get('gate_passed') else 'FAIL'} "
                  f"(scenarios={integration.get('scenario_count')})"
              )
          if view_designer:
              lines.append(
                  f"- view_designer gate: {'PASS' if view_designer.get('gate_passed') else 'FAIL'} "
                  f"(scenarios={view_designer.get('scenario_count')}, avg={view_designer.get('average_overall')})"
              )
          if live_judge and isinstance(live_judge, list):
              passed = sum(1 for r in live_judge if r.get("score", {}).get("passed"))
              judges = [r["judge"]["total"] for r in live_judge if r.get("judge") and isinstance(r["judge"].get("total"), (int, float))]
              judge_avg = sum(judges) / len(judges) if judges else 0
              lines.append(
                  f"- live judge: {passed}/{len(live_judge)} replay passed, "
                  f"judge avg={judge_avg:.1f}/100 ({len(judges)} judged)"
              )
          if outcomes:
              policy = outcomes.get("policy", {})
              thresholds = policy.get("thresholds", {})
              lines.append(
                  f"- outcomes gate: {'PASS' if outcomes.get('gate_passed') else 'FAIL'} "
                  f"(current_actions={outcomes.get('current', {}).get('total_actions')}, "
                  f"baseline_actions={outcomes.get('baseline', {}).get('total_actions')})"
              )
              if thresholds:
                  lines.append(
                      "- regression policy thresholds: "
                      f"success_rate_delta_min={thresholds.get('success_rate_delta_min')}, "
                      f"rollback_rate_delta_max={thresholds.get('rollback_rate_delta_max')}, "
                      f"p95_duration_ms_delta_max={thresholds.get('p95_duration_ms_delta_max')}"
                  )

          lines.append("")
          lines.append("Artifacts include JSON, text, weekly digest, and policy snapshot.")
          text = "\n".join(lines) + "\n"

          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write(text)
          print(text)
          PY

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pulse-agent-eval-artifacts
          path: artifacts/

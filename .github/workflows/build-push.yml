name: Build & Push Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: git sha)'
        required: false
      build_mcp:
        description: 'Also build MCP server image'
        type: boolean
        default: false

env:
  REGISTRY: quay.io
  IMAGE_NAME: amobrem/pulse-agent
  MCP_IMAGE_NAME: amobrem/pulse-agent

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests before build
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          ruff check sre_agent/ tests/
          ruff format --check sre_agent/ tests/
          python -m pytest tests/ -q

      - name: Set image tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          GIT_SHA: ${{ github.sha }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "tag=${GIT_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_TAG" ]]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GIT_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64

  build-mcp:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.build_mcp }}
    steps:
      - name: Checkout OpenShift MCP Server
        uses: actions/checkout@v4
        with:
          repository: openshift/openshift-mcp-server
          path: openshift-mcp-server

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push MCP server image
        uses: docker/build-push-action@v5
        with:
          context: openshift-mcp-server
          file: openshift-mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.MCP_IMAGE_NAME }}:mcp-server
          platforms: linux/amd64

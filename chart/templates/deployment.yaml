{{- include "sre-agent.validateCredentials" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sre-agent.fullname" . }}
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "sre-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sre-agent.selectorLabels" . | nindent 8 }}
      {{- if not .Values.vertexAI.projectId }}
      annotations:
        pulse.openshift.io/ai-backend: "not-configured"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sre-agent.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sre-agent
          {{- if and (not .Values.image.repository) .Values.image.internalRegistry }}
          image: "image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/pulse-agent:{{ .Values.image.tag | default "latest" }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            {{- if .Values.vertexAI.projectId }}
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.vertexAI.projectId | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.vertexAI.region | quote }}
            {{- if .Values.vertexAI.existingSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
            {{- end }}
            {{- end }}
            {{- if .Values.anthropicApiKey.existingSecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anthropicApiKey.existingSecret }}
                  key: {{ .Values.anthropicApiKey.existingSecretKey }}
            {{- end }}
            {{- if eq .Values.database.type "postgresql" }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgresql.auth.existingSecret | default (printf "%s-pg-auth" (include "sre-agent.fullname" .)) }}
                  key: {{ .Values.database.postgresql.auth.secretKey }}
            - name: PULSE_AGENT_DATABASE_URL
              value: "postgresql://{{ .Values.database.postgresql.auth.username }}:$(PGPASSWORD)@{{ include "sre-agent.fullname" . }}-postgresql:5432/{{ .Values.database.postgresql.auth.database }}"
            {{- else }}
            - name: PULSE_AGENT_DATABASE_URL
              value: "sqlite:////tmp/pulse_agent/pulse.db"
            {{- end }}
            {{- if .Values.memory.enabled }}
            - name: PULSE_AGENT_MEMORY
              value: "1"
            {{- end }}
            {{- if .Values.acm.enabled }}
            - name: PULSE_AGENT_ACM_THANOS_ENABLED
              value: "true"
            {{- if .Values.acm.thanosUrl }}
            - name: PULSE_AGENT_ACM_THANOS_URL
              value: {{ .Values.acm.thanosUrl | quote }}
            {{- end }}
            {{- end }}
            - name: PULSE_AGENT_WS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "sre-agent.wsTokenSecretName" . }}
                  key: {{ .Values.wsAuth.secretKey }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.vertexAI.existingSecret }}
            - name: gcp-sa-key
              mountPath: /var/secrets/google
              readOnly: true
            {{- end }}
            {{- if and .Values.memory.enabled .Values.memory.persistence.enabled }}
            - name: memory-data
              mountPath: /tmp/pulse_agent
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.vertexAI.existingSecret }}
        - name: gcp-sa-key
          secret:
            secretName: {{ .Values.vertexAI.existingSecret }}
        {{- end }}
        {{- if and .Values.memory.enabled .Values.memory.persistence.enabled }}
        - name: memory-data
          persistentVolumeClaim:
            claimName: {{ include "sre-agent.fullname" . }}-memory
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

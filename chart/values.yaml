# Default 1 replica. Uses RollingUpdate (maxSurge: 1), so two pods
# briefly coexist during upgrades. The memory PVC (ReadWriteOnce) is
# only mounted if memory.persistence.enabled=true.
replicaCount: 1

image:
  # Quay.io (recommended): quay.io/amobrem/pulse-agent
  # Internal registry: leave empty with internalRegistry=true
  repository: "quay.io/amobrem/pulse-agent"
  tag: "latest"
  pullPolicy: Always
  internalRegistry: false  # Set true to use OpenShift internal registry (requires on-cluster builds)

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Vertex AI configuration
vertexAI:
  projectId: ""
  region: ""

  # Reference a pre-created secret containing the GCP service account key
  existingSecret: ""
  existingSecretKey: "key.json"

# Direct Anthropic API (alternative to Vertex AI)
# Create with: kubectl create secret generic anthropic-api-key --from-literal=api-key=sk-ant-...
anthropicApiKey:
  existingSecret: ""
  existingSecretKey: "api-key"

# RBAC — controls what the agent can do on the cluster
rbac:
  create: true
  allowWriteOperations: false
  allowSecretAccess: false

# Network Policy — restricts egress to DNS + HTTPS only.
# Disabled by default because managed clusters (ROSA, ARO, GKE) route DNS
# through the host network, which namespaceSelector-based rules can't reach.
# Enable on self-managed clusters where you control the CNI.
networkPolicy:
  disabled: true

# Self-improving memory system
memory:
  enabled: true
  # For persistent memory across pod restarts, enable a PVC
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi

# WebSocket authentication — token secret is owned by the umbrella chart (pulse-ws-token).
# The umbrella sets this via agent.wsAuth.existingSecret in its values.yaml.
wsAuth:
  existingSecret: ""
  secretKey: "token"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Database — PostgreSQL (production)
database:
  type: "postgresql"
  # PostgreSQL settings (only used when type=postgresql)
  postgresql:
    enabled: true
    image: registry.redhat.io/rhel9/postgresql-15:latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage: 5Gi
    storageClass: ""
    # auth section must be present for template to reference .Values.database.postgresql.auth.*
    auth:
      database: pulse_agent
      username: pulse
      # Auto-generated if empty. Reference a pre-created secret:
      # kubectl create secret generic pulse-pg-auth --from-literal=password=...
      existingSecret: ""
      secretKey: "password"

# MCP Server — optional OpenShift MCP server deployment
mcp:
  enabled: true
  image: "ghcr.io/containers/kubernetes-mcp-server:latest"
  toolsets:
    - core
    - helm
    - observability

nodeSelector: {}
tolerations: []
affinity: {}

replicaCount: 2

image:
  repository: ""  # Set by deploy.sh or --set. Uses internal registry when empty.
  tag: "0.2.0"
  pullPolicy: IfNotPresent
  internalRegistry: true  # When true, image is built and pushed to the internal OpenShift registry

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Vertex AI configuration
vertexAI:
  projectId: ""
  region: ""

  # Reference a pre-created secret containing the GCP service account key
  existingSecret: ""
  existingSecretKey: "key.json"

# Direct Anthropic API (alternative to Vertex AI)
# anthropicApiKey:
#   existingSecret: ""
#   existingSecretKey: "api-key"

# RBAC — controls what the agent can do on the cluster
rbac:
  create: true
  allowWriteOperations: false
  allowSecretAccess: false

# Network Policy — restricts egress to DNS + HTTPS only.
# Disabled by default because managed clusters (ROSA, ARO, GKE) route DNS
# through the host network, which namespaceSelector-based rules can't reach.
# Enable on self-managed clusters where you control the CNI.
networkPolicy:
  disabled: true

# Self-improving memory system
memory:
  enabled: false
  dbPath: "/tmp/pulse_agent/memory.db"
  # For persistent memory across pod restarts, enable a PVC
  persistence:
    enabled: false
    storageClass: ""
    size: 1Gi

# WebSocket authentication
wsAuth:
  # Set a token for WebSocket authentication
  # Create with: kubectl create secret generic pulse-ws-token --from-literal=token=your-secret-token
  existingSecret: ""
  secretKey: "token"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
